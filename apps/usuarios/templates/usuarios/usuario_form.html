{% extends 'usuarios/base.html' %}

{% block content %}
    <h2>{% if object %}Editar Usuario{% else %}Crear Nuevo Usuario{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
    </form>
    <br>
    <a href="{% url 'usuarios:lista' %}">Volver a la lista</a>
{% endblock %}
