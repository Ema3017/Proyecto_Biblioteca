<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Biblioteca - UTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-custom {
            background-color: #0d1b2a;
            /* Azul oscuro elegante */
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="{% url 'prestamos:dashboard' %}">
                <i class="bi bi-book-half me-2 text-warning"></i> Biblioteca UTP
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <!-- Dashboard único -->
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="{% url 'prestamos:dashboard' %}">Dashboard</a>
                    </li>

                    <!-- Menú desplegable: Libros -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white-50" href="#" data-bs-toggle="dropdown">Libros</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{% url 'libros:catalogo' %}">Ver Catálogo</a></li>
                            <li><a class="dropdown-item" href="{% url 'libros:crear' %}">Registrar Nuevo</a></li>
                        </ul>
                    </li>

                    <!-- Menú desplegable: Préstamos -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white-50" href="#"
                            data-bs-toggle="dropdown">Préstamos</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{% url 'prestamos:gestion_prestamos' %}">Gestión
                                    Administrativa</a>
                            </li>
                            <li><a class="dropdown-item" href="{% url 'prestamos:mis_prestamos' %}">Mis Préstamos</a>
                            </li>
                        </ul>
                    </li>

                    <!-- Menú desplegable: Usuarios -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white-50" href="#"
                            data-bs-toggle="dropdown">Usuarios</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{% url 'usuarios:lista' %}">Lista de Usuarios</a></li>
                        </ul>
                    </li>
                </ul>

                <!-- Lógica del botón Entrar/Salir -->
                <div class="d-flex">
                    {% if user.is_authenticated %}
                    <!-- Formulario necesario para que el Logout funcione por POST -->
                    <form action="{% url 'usuarios:logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm">Salir</button>
                    </form>
                    {% else %}
                    <a href="{% url 'usuarios:login' %}" class="btn btn-outline-light btn-sm">Entrar</a>
                    {% endif %}
                </div>

            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script src="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js]
        (https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js)(https://cdn.jsdelivr.net/npm/chart.js)"></script>
</body>

</html>
