<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Biblioteca - UTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-custom {
            background-color: #0d1b2a; /* Azul oscuro elegante */
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="{% url 'prestamos:dashboard' %}">
                <i class="bi bi-book-half me-2 text-warning"></i> Biblioteca UTP
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="{% url 'prestamos:dashboard' %}">
                            <i class="bi bi-speedometer2 me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="{% url 'prestamos:gestion_prestamos' %}">
                            <i class="bi bi-gear me-1"></i> Gestión de Préstamos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="{% url 'prestamos:mis_prestamos' %}">
                            <i class="bi bi-bookmark-star me-1"></i> Mis Préstamos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="{% url 'usuarios:lista' %}">
                            <i class="bi bi-people me-1"></i> Lista Usuarios
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <a href="{% url 'usuarios:login' %}" class="btn btn-sm btn-outline-light d-flex align-items-center">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
