{% extends 'usuarios/base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            
            <!-- Tarjeta de Registro Estilizada -->
            <div class="card shadow border-0 rounded-3">
                <div class="card-header bg-dark text-white text-center py-4">
                    <h4 class="fw-bold mb-0"><i class="bi bi-person-plus-fill me-2 text-warning"></i>Registro de Nuevo Usuario</h4>
                    <small class="text-white-50">Crea una cuenta para acceder a la biblioteca</small>
                </div>
                <div class="card-body p-4">
                    
                    <form method="post" class="needs-validation">
                        {% csrf_token %}
                        
                        <!-- Contenedor para inyectar estilos Bootstrap a los inputs automáticos de Django -->
                        <div class="mb-4 d-grid gap-3 user-register-fields">
                            {{ form.as_p }}
                        </div>

                        <!-- Botón de Registro -->
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm mb-3">
                            <i class="bi bi-check-circle me-2"></i>Registrarme
                        </button>
                    </form>

                </div>
                <div class="card-footer bg-light text-center py-3">
                    <a href="{% url 'usuarios:login' %}" class="text-decoration-none small fw-semibold">
                        <i class="bi bi-arrow-left me-1"></i> Ya tengo una cuenta, iniciar sesión
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Estilos para transformar la lista nativa de Django a Bootstrap 5 -->
<style>
    .user-register-fields p {
        margin-bottom: 1rem;
    }
    .user-register-fields label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #212529;
    }
    .user-register-fields input, .user-register-fields select {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
    }
    .user-register-fields input:focus, .user-register-fields select:focus {
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25);
    }
    .user-register-fields .helptext {
        display: block;
        font-size: 0.8rem;
        color: #6c757d;
        margin-top: 0.25rem;
    }
    .user-register-fields ul.errorlist {
        padding-left: 0;
        list-style: none;
        color: #dc3545;
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
    }
</style>
{% endblock %}
