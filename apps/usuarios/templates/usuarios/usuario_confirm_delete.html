{% extends 'usuarios/base.html' %}

{% block content %}
    <h2>Confirmar Eliminación</h2>
    <p>¿Estás seguro que deseas eliminar al usuario "{{ object.username }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
    </form>
    <br>
    <a href="{% url 'usuarios:lista' %}">Cancelar y Volver</a>
{% endblock %}
