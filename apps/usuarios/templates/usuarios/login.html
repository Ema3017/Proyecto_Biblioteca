{% extends 'usuarios/base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            
            <div class="card shadow border-0 rounded-3">
                <div class="card-header bg-dark text-white text-center py-4">
                    <h4 class="fw-bold mb-0"><i class="bi bi-shield-lock me-2 text-warning"></i>Iniciar Sesión</h4>
                    <small class="text-white-50">Acceso al Sistema de Biblioteca</small>
                </div>
                <div class="card-body p-4">
                    
                    <form method="post" class="needs-validation">
                        {% csrf_token %}
                        
                        <div class="mb-4 d-grid gap-3 user-login-fields">
                            {{ form.as_p }}
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                        </button>
                    </form>

                </div>
                <div class="card-footer bg-light text-center py-3">
                    <small class="text-muted">Fase de Desarrollo / UTP</small>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    .user-login-fields p {
        margin-bottom: 1rem;
    }
    .user-login-fields label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #212529;
    }
    .user-login-fields input {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
    }
    .user-login-fields input:focus {
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25);
    }
    /* Limpieza de errores nativos de Django para que no descuadren el diseño */
    .user-login-fields ul.errorlist {
        padding-left: 0;
        list-style: none;
        color: #dc3545;
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
    }
</style>
{% endblock %}
